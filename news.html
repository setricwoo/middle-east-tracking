        // 当前筛选
        let currentCategory = 'all';

        // 初始化
        function init() {
            renderNews();
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('news-container');
            let filtered = CLS_NEWS_DATA;
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无此类新闻</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map((news, index) => `
                <a href="${news.url}" target="_blank" class="news-item">
                    <div class="news-header">
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-time">${news.time || ''}</div>
                    </div>
                    <div class="news-summary">${escapeHtml(news.summary)}</div>
                    <div class="news-meta">
                        <div class="news-source">
                            <span class="cls-badge">财联社</span>
                        </div>
                        <span class="news-tag ${news.category}">${getCategoryName(news.category)}</span>
                    </div>
                </a>
            `).join('');
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCategoryName(cat) {
            const names = {
                military: '军事行动',
                energy: '能源/石油',
                shipping: '航运/海峡',
                diplomacy: '外交/国际'
            };
            return names[cat] || '其他';
        }

        init();
    </script>
