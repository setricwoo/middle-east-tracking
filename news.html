        // 当前筛选
        let currentCategory = 'all';

        // 初始化
        function init() {
            renderNews();
        }

        // 解析新闻标题和正文
        function parseNewsContent(title, summary) {
            // 匹配【】内的内容作为标题
            const bracketMatch = title.match(/【([^】]+)】/);
            let displayTitle = title;
            let displaySummary = '';
            
            if (bracketMatch) {
                displayTitle = bracketMatch[1].trim();
            }
            
            // 优先使用 summary 作为正文（summary通常更完整）
            if (summary && summary.trim()) {
                // 如果 summary 有】，提取】后的内容
                if (summary.includes('】')) {
                    displaySummary = summary.substring(summary.indexOf('】') + 1).trim();
                } else {
                    // summary 没有】，直接使用完整summary
                    displaySummary = summary.trim();
                }
            } else if (title && title.includes('】')) {
                // 如果 summary 为空，尝试用 title
                displaySummary = title.substring(title.indexOf('】') + 1).trim();
            }
            
            return { title: displayTitle, summary: displaySummary };
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('news-container');
            let filtered = CLS_NEWS_DATA;
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无此类新闻</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map((news, index) => {
                const parsed = parseNewsContent(news.title, news.summary);
                const displayTitle = parsed.title;
                const displaySummary = parsed.summary;
                
                return `
                <a href="${news.url}" target="_blank" class="news-item">
                    <div class="news-header">
                        <div class="news-title">【${escapeHtml(displayTitle)}】</div>
                        <div class="news-time">${news.time || ''}</div>
                    </div>
                    ${displaySummary ? `<div class="news-summary">${escapeHtml(displaySummary)}</div>` : ''}
                </a>
            `}).join('');
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCategoryName(cat) {
            const names = {
                military: '军事行动',
                energy: '能源/石油',
                shipping: '航运/海峡',
                diplomacy: '外交/国际'
            };
            return names[cat] || '其他';
        }

        init();
    </script>
