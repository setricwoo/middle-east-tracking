        // 去重函数：基于标题相似度去重，保留最早发布的新闻
        function deduplicateNews(newsArray) {
            const seen = new Map();
            
            return newsArray.filter(item => {
                // 生成标题指纹（前20个字符）
                const fingerprint = item.title.slice(0, 20).toLowerCase().replace(/\s+/g, '');
                
                if (seen.has(fingerprint)) {
                    // 已存在相同指纹，比较时间，保留更早的
                    const existing = seen.get(fingerprint);
                    if (new Date(item.time) < new Date(existing.time)) {
                        seen.set(fingerprint, item);
                        return true;
                    }
                    return false;
                } else {
                    seen.set(fingerprint, item);
                    return true;
                }
            }).sort((a, b) => new Date(b.time) - new Date(a.time)); // 按时间倒序
        }

        // 处理后的新闻数据
        const NEWS_DATA = {
            updateTime: "2026-03-09 14:30",
            news: deduplicateNews(RAW_NEWS_DATA)
        };

        // 当前筛选
        let currentCategory = 'all';

        // 初始化
        function init() {
            renderNews();
            setupFilters();
            document.getElementById('update-time').textContent = NEWS_DATA.updateTime;
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('news-container');
            let filtered = NEWS_DATA.news;
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(n => n.category === currentCategory);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无此类新闻</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map((news, index) => `
                <a href="${news.url}" target="_blank" class="news-item ${news.category}">
                    <div class="news-header">
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-time">${formatTime(news.time)}</div>
                    </div>
                    <div class="news-summary">${escapeHtml(news.summary)}</div>
                    <div class="news-meta">
                        <span class="category-tag ${news.category}">${getCategoryName(news.category)}</span>
                        <span class="news-count">#${index + 1}</span>
                    </div>
                </a>
            `).join('');
        }

        // 设置筛选
        function setupFilters() {
            document.querySelectorAll('[data-category]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderNews();
                });
            });
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timeStr) {
            const date = new Date(timeStr);
            const now = new Date();
            const diff = (now - date) / 60000; // 分钟
            
            if (diff < 60) return Math.floor(diff) + '分钟前';
            if (diff < 1440) return Math.floor(diff / 60) + '小时前';
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getCategoryName(cat) {
            const names = { military: '军事', energy: '能源', shipping: '航运', diplomacy: '外交', market: '金融' };
            return names[cat] || '其他';
        }

        init();
    </script>
</body>
