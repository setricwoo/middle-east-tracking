                <a href="${news.url}" target="_blank" class="news-item">
                    <div class="news-header">
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-time">${formatTime(news.time)}</div>
                    </div>
                    <div class="news-summary">${escapeHtml(news.summary)}</div>
                    <div class="news-meta">
                        <div class="news-source">
                            <span class="cls-badge">财联社</span>
                        </div>
                        <span class="news-tag ${news.category}">${getCategoryName(news.category)}</span>
                    </div>
                </a>
            `).join('');
        }

        // 设置筛选
        function setupFilters() {
            document.querySelectorAll('[data-category]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderNews();
                });
            });
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timeStr) {
            const date = new Date(timeStr);
            const now = new Date();
            const diff = (now - date) / 60000;
            
            if (diff < 60) return Math.floor(diff) + '分钟前';
            if (diff < 1440) return Math.floor(diff / 60) + '小时前';
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getCategoryName(cat) {
            const names = {
                military: '军事行动',
                energy: '能源/石油',
                shipping: '航运/海峡',
                diplomacy: '外交/国际'
            };
            return names[cat] || '其他';
        }

        init();
    </script>
</body>
</html>
