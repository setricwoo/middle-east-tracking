<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中东地缘实时追踪 | 每10分钟更新</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            padding: 20px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .status-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 0.85rem;
            color: #94a3b8;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4ade80;
            font-weight: 500;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .countdown {
            font-family: monospace;
            color: #fbbf24;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        
        .stat-card h3 {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid #475569;
            color: #cbd5e1;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .news-item {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .news-item:hover {
            background: rgba(51, 65, 85, 0.6);
            border-color: #3b82f6;
            transform: translateX(4px);
        }
        
        .news-item.energy {
            border-left: 3px solid #f59e0b;
        }
        
        .news-item.military {
            border-left: 3px solid #ef4444;
        }
        
        .news-item.diplomacy {
            border-left: 3px solid #10b981;
        }
        
        .news-item.shipping {
            border-left: 3px solid #8b5cf6;
        }
        
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
            gap: 10px;
        }
        
        .news-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.5;
            flex: 1;
        }
        
        .news-time {
            font-size: 0.75rem;
            color: #64748b;
            white-space: nowrap;
        }
        
        .news-summary {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .news-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .tag.energy { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .tag.military { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .tag.diplomacy { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .tag.shipping { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .tag.general { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.2rem;
            }
            
            .status-bar {
                font-size: 0.75rem;
            }
            
            .news-title {
                font-size: 0.95rem;
            }
            
            .news-summary {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 中东地缘实时追踪系统</h1>
        <div class="status-bar">
            <span class="live-indicator">
                <span class="live-dot"></span>
                实时更新中
            </span>
            <span class="status-item">
                更新频率: 每10分钟
            </span>
            <span class="status-item">
                下次更新: <span class="countdown" id="countdown">--:--</span>
            </span>
            <span class="status-item" id="last-update">
                上次更新: 加载中...
            </span>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>今日新闻</h3>
                <div class="stat-value" id="total-news">--</div>
            </div>
            <div class="stat-card">
                <h3>军事动态</h3>
                <div class="stat-value" id="military-count">--</div>
            </div>
            <div class="stat-card">
                <h3>能源市场</h3>
                <div class="stat-value" id="energy-count">--</div>
            </div>
            <div class="stat-card">
                <h3>航运通道</h3>
                <div class="stat-value" id="shipping-count">--</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="military">军事动态</button>
            <button class="filter-btn" data-filter="energy">能源市场</button>
            <button class="filter-btn" data-filter="shipping">航运通道</button>
            <button class="filter-btn" data-filter="diplomacy">外交斡旋</button>
        </div>
        
        <div id="news-container" class="news-list">
            <div class="loading">正在加载最新新闻...</div>
        </div>
    </div>
    
    <script>
        let currentFilter = 'all';
        let newsData = [];
        let countdownInterval;
        
        // 获取新闻数据
        async function fetchNews() {
            try {
                const response = await fetch('/api/latest-news');
                if (!response.ok) throw new Error('获取失败');
                
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    newsData = data.data;
                    renderNews();
                    updateStats();
                    updateLastUpdate(data.updatedAt, data.minutesAgo);
                    startCountdown(data.nextUpdateIn || 10);
                } else if (data.isUpdating) {
                    showLoading('数据初始化中，首次更新可能需要几分钟...');
                    setTimeout(fetchNews, 30000); // 30秒后重试
                } else {
                    showEmpty();
                }
            } catch (error) {
                showError('获取新闻失败: ' + error.message);
            }
        }
        
        // 渲染新闻列表
        function renderNews() {
            const container = document.getElementById('news-container');
            const filtered = currentFilter === 'all' 
                ? newsData 
                : newsData.filter(n => n.type === currentFilter);
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>该分类暂无新闻</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(news => `
                <a href="${news.url}" target="_blank" class="news-item ${news.type}">
                    <div class="news-header">
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-time">${formatTime(news.publishedAt)}</div>
                    </div>
                    <div class="news-summary">${escapeHtml(news.summary || '')}</div>
                    <div class="news-meta">
                        <span class="tag ${news.type}">${getTypeLabel(news.type)}</span>
                        <span>${escapeHtml(news.source)}</span>
                    </div>
                </a>
            `).join('');
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('total-news').textContent = newsData.length;
            document.getElementById('military-count').textContent = 
                newsData.filter(n => n.type === 'military').length;
            document.getElementById('energy-count').textContent = 
                newsData.filter(n => n.type === 'energy').length;
            document.getElementById('shipping-count').textContent = 
                newsData.filter(n => n.type === 'shipping').length;
        }
        
        // 更新上次更新时间
        function updateLastUpdate(isoTime, minutesAgo) {
            const el = document.getElementById('last-update');
            if (!isoTime) {
                el.textContent = '等待首次更新...';
                return;
            }
            const time = new Date(isoTime);
            el.textContent = `上次更新: ${minutesAgo}分钟前 (${time.toLocaleTimeString()})`;
        }
        
        // 倒计时
        function startCountdown(minutes) {
            let seconds = minutes * 60;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    fetchNews(); // 时间到，刷新数据
                    return;
                }
                
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                document.getElementById('countdown').textContent = 
                    `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }
        
        // 筛选按钮事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderNews();
            });
        });
        
        // 工具函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = Math.floor((now - date) / 60000);
            
            if (diff < 1) return '刚刚';
            if (diff < 60) return `${diff}分钟前`;
            return date.toLocaleString('zh-CN', { 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }
        
        function getTypeLabel(type) {
            const labels = {
                military: '军事',
                energy: '能源',
                shipping: '航运',
                diplomacy: '外交',
                general: '综合'
            };
            return labels[type] || '综合';
        }
        
        function showLoading(msg) {
            document.getElementById('news-container').innerHTML = 
                `<div class="loading">${msg}</div>`;
        }
        
        function showError(msg) {
            document.getElementById('news-container').innerHTML = 
                `<div class="error">${msg}</div>`;
        }
        
        function showEmpty() {
            document.getElementById('news-container').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无新闻数据</p>
                </div>
            `;
        }
        
        // 初始化
        fetchNews();
        
        // 每30秒检查一次更新（作为备份）
        setInterval(fetchNews, 30000);
    </script>
</body>
</html>
