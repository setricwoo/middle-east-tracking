name: Daily Briefing Update

on:
  schedule:
    # UTC 16:02 = Beijing 00:02
    - cron: '2 16 * * *'
  workflow_dispatch:

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install requests
        
    - name: Run briefing update script
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        AI_MODEL: ${{ secrets.AI_MODEL }}
      run: python update_briefing_grok.py
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add briefing.html briefing_data.json
        git diff --staged --quiet || git commit -m "Update briefing $(date +'%Y-%m-%d')"
        git push
