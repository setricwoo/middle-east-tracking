name: ISW 战事更新 (每12小时)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install dependencies
        run: pip install playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run ISW update script
        run: python fetch_isw_update.py
        timeout-minutes: 8
        env:
          # 可选：设置 DeepL API Key 以获得更好的翻译质量
          # 在 GitHub Repo Settings -> Secrets -> Actions 中添加 DEEPL_API_KEY
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          # 可选：Hugging Face API Key（提高速率限制）
          HF_API_KEY: ${{ secrets.HF_API_KEY }}

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add isw_data.json
          git diff --staged --quiet || git commit -m "ISW更新 $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
