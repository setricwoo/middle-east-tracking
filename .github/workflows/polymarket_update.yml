name: Polymarket Update (Every 20min)

on:
  schedule:
    # 每20分钟运行一次 (UTC时间)
    - cron: '*/20 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

env:
  # 使用Node.js 24避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-polymarket:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Run Polymarket updater
      run: python update_polymarket_html.py
      timeout-minutes: 8
      continue-on-error: true
        
    - name: Check if files changed
      id: check_changes
      run: |
        if git diff --quiet HEAD -- polymarket.html polymarket_data.json; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Changes detected"
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add polymarket.html polymarket_data.json
        git commit -m "Update Polymarket $(date +'%Y-%m-%d %H:%M')"
        git push
