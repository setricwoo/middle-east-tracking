name: 12-Hour Full Updates (AI-Powered)

on:
  schedule:
    # 每12小时运行一次：UTC 00:00, 12:00 = 北京时间 08:00, 20:00
    - cron: '0 0,12 * * *'
  workflow_dispatch:

env:
  # 使用Node.js 24避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-update:
    name: Full Update with AI
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install requests
        
    - name: Run full update with AI
      env:
        # Kimi API配置（用于海湾图谱和霍尔木兹海峡）
        KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        KIMI_BASE_URL: ${{ secrets.KIMI_BASE_URL }}
        KIMI_MODEL: ${{ secrets.KIMI_MODEL }}
        # 简报API配置（update_briefing_grok.py使用）
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        AI_MODEL: ${{ secrets.AI_MODEL }}
      run: python update_all_with_ai.py
      timeout-minutes: 15
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html tracking.html briefing.html 历史.csv
        git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M') - AI powered"
        git push
